name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install (backend)
        working-directory: backend
        run: npm ci

      - name: Unit tests (backend)
        working-directory: backend
        run: npm run test:unit

  # TODO(integration): Add Firebase emulators (Auth + Firestore) + Supertest runs (Commits 5-8).
  # TODO(system): Add Playwright E2E runs (Commits 9-12).

